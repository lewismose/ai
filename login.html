<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>TradeVision AI – Access Portal</title>
  <meta name="description" content="Secure activation key portal for TradeVision AI – Advanced Market Intelligence Platform."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0d1a;
      --bg2:      #0e1220;
      --surface:  rgba(255,255,255,0.04);
      --border:   rgba(255,255,255,0.08);
      --border-h: rgba(123,94,167,0.45);
      --purple:   #7B5EA7;
      --blue:     #4FACFE;
      --teal:     #00f2fe;
      --green:    #22d3a0;
      --red:      #ff4d6d;
      --text:     #e8eaf6;
      --text2:    #8892b0;
      --text3:    #4a5580;
      --grad:     linear-gradient(135deg, #7B5EA7, #4FACFE);
      --grad2:    linear-gradient(135deg, #4FACFE, #00f2fe);
      --shadow:   0 8px 40px rgba(0,0,0,0.6);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Animated background orbs ── */
    .bg-orbs {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: 0.18; animation: orbFloat 20s ease-in-out infinite;
    }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #7B5EA7, transparent); top: -200px; left: -200px; animation-delay: 0s; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #4FACFE, transparent); bottom: -150px; right: -150px; animation-delay: -7s; }
    .orb-3 { width: 350px; height: 350px; background: radial-gradient(circle, #00f2fe, transparent); top: 50%; left: 55%; animation-delay: -13s; }
    .orb-4 { width: 280px; height: 280px; background: radial-gradient(circle, #22d3a0, transparent); top: 30%; left: 20%; animation-delay: -4s; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0,0) scale(1); }
      33%       { transform: translate(40px,-40px) scale(1.05); }
      66%       { transform: translate(-30px,30px) scale(0.95); }
    }

    /* ── Particle canvas ── */
    #particles-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ── Grid lines ── */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(123,94,167,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123,94,167,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── Main wrapper ── */
    .login-wrapper {
      position: relative; z-index: 1;
      height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    /* ── Login card ── */
    .login-card {
      width: 100%; max-width: 460px;
      background: rgba(14,18,32,0.75);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow: var(--shadow), 0 0 0 1px rgba(123,94,167,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
      padding: 44px 40px 40px;
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo area ── */
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 36px; gap: 14px;
    }
    .logo-icon {
      width: 68px; height: 68px; border-radius: 20px;
      background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 1px rgba(123,94,167,0.4), 0 8px 30px rgba(123,94,167,0.35);
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 0 1px rgba(123,94,167,0.4), 0 8px 30px rgba(123,94,167,0.35); }
      50%       { box-shadow: 0 0 0 1px rgba(79,172,254,0.5), 0 8px 40px rgba(79,172,254,0.45); }
    }
    .logo-text-wrap { text-align: center; }
    .logo-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.7rem; font-weight: 700; letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .logo-name .grad { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .logo-tagline {
      font-size: 0.75rem; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase;
    }

    /* ── Section label ── */
    .section-header {
      text-align: center; margin-bottom: 28px;
    }
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.15rem; font-weight: 600; margin-bottom: 6px;
    }
    .section-sub {
      font-size: 0.8rem; color: var(--text2); line-height: 1.5;
    }

    /* ── Input group ── */
    .input-group { margin-bottom: 18px; }
    .input-label {
      display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--text2); margin-bottom: 8px;
    }
    .input-wrapper {
      position: relative;
    }
    .key-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.05rem;
      letter-spacing: 2px;
      padding: 14px 50px 14px 18px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      text-transform: uppercase;
    }
    .key-input::placeholder {
      color: var(--text3); letter-spacing: 1px; font-size: 0.85rem;
      text-transform: none; font-family: 'Inter', sans-serif;
    }
    .key-input:focus {
      border-color: var(--purple);
      background: rgba(123,94,167,0.06);
      box-shadow: 0 0 0 3px rgba(123,94,167,0.18), 0 4px 20px rgba(0,0,0,0.3);
    }
    .input-icon {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      color: var(--text3); pointer-events: none; transition: color 0.2s;
    }
    .key-input:focus + .input-icon { color: var(--purple); }

    /* ── Error message ── */
    .error-msg {
      display: none; margin-top: 10px;
      background: rgba(255,77,109,0.1);
      border: 1px solid rgba(255,77,109,0.3);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.8rem;
      color: #ff7090;
      display: flex; align-items: center; gap: 8px;
      opacity: 0; transform: translateY(-6px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    .error-msg.show {
      opacity: 1; transform: translateY(0); pointer-events: auto;
    }
    .error-msg svg { flex-shrink: 0; }

    /* ── Login button ── */
    .btn-login {
      width: 100%; margin-top: 8px;
      background: var(--grad);
      border: none; border-radius: 12px;
      color: #fff; font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem; font-weight: 600; letter-spacing: 0.3px;
      padding: 15px;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
      box-shadow: 0 4px 20px rgba(123,94,167,0.4);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(123,94,167,0.55); }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Loading spinner on button ── */
    .btn-spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-login.loading .btn-spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .btn-icon { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Security badges ── */
    .badges {
      display: flex; justify-content: center; gap: 18px;
      margin-top: 24px;
    }
    .badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.68rem; color: var(--text3); letter-spacing: 0.3px;
    }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 8px var(--green);
    }

    /* ── Divider ── */
    .divider {
      height: 1px; background: var(--border); margin: 28px 0;
    }

    /* ── Attempt counter ── */
    .attempt-info {
      text-align: center; font-size: 0.72rem; color: var(--text3);
      margin-top: 16px; letter-spacing: 0.2px;
    }
    .attempt-info span { color: var(--text2); }

    /* ── Shake animation for wrong key ── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%       { transform: translateX(-8px); }
      30%       { transform: translateX(8px); }
      45%       { transform: translateX(-6px); }
      60%       { transform: translateX(6px); }
      75%       { transform: translateX(-3px); }
      90%       { transform: translateX(3px); }
    }
    .shake { animation: shake 0.5s cubic-bezier(0.36,0.07,0.19,0.97) both; }

    /* ── Success overlay ── */
    .success-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(10,13,26,0.95); backdrop-filter: blur(12px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
    }
    .success-overlay.show { opacity: 1; pointer-events: auto; }
    .success-icon {
      width: 90px; height: 90px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(34,211,160,0.15), rgba(34,211,160,0.05));
      border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      animation: successPop 0.5s cubic-bezier(0.22,1,0.36,1) 0.2s both;
      box-shadow: 0 0 40px rgba(34,211,160,0.3);
    }
    @keyframes successPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .success-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem; font-weight: 700; margin-bottom: 8px;
      animation: fadeUp 0.4s ease 0.4s both;
    }
    .success-sub {
      color: var(--text2); font-size: 0.9rem;
      animation: fadeUp 0.4s ease 0.55s both;
    }
    .success-bar-wrap {
      width: 260px; height: 3px; background: rgba(255,255,255,0.07);
      border-radius: 2px; margin-top: 28px; overflow: hidden;
      animation: fadeUp 0.4s ease 0.65s both;
    }
    .success-bar {
      height: 100%; background: var(--green);
      border-radius: 2px; width: 0%;
      transition: width 1.8s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scroll shimmer on card border ── */
    @keyframes borderGlow {
      0%, 100% { border-color: rgba(255,255,255,0.08); }
      50% { border-color: rgba(123,94,167,0.25); }
    }
    .login-card { animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both, borderGlow 5s ease-in-out 0.7s infinite; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .login-card { padding: 32px 24px 28px; border-radius: 20px; }
      .logo-name { font-size: 1.45rem; }
    }
  </style>
</head>
<body>

<!-- Animated background -->
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>
<canvas id="particles-canvas"></canvas>
<div class="grid-overlay"></div>

<!-- Success overlay -->
<div class="success-overlay" id="success-overlay">
  <div class="success-icon">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#22d3a0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <div class="success-title">Access Granted ✦</div>
  <div class="success-sub">Redirecting to TradeVision AI…</div>
  <div class="success-bar-wrap">
    <div class="success-bar" id="success-bar"></div>
  </div>
</div>

<!-- Login card -->
<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="34" height="34" viewBox="0 0 36 36" fill="none">
          <path d="M7 24L13 16L18 20L24 11L29 17" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="29" cy="17" r="2.2" fill="white"/>
        </svg>
      </div>
      <div class="logo-text-wrap">
        <div class="logo-name">TradeVision <span class="grad">AI</span></div>
        <div class="logo-tagline">Advanced Market Intelligence Portal</div>
      </div>
    </div>

    <!-- Section header -->
    <div class="section-header">
      <div class="section-title">🔑 Enter Activation Key</div>
      <div class="section-sub">This portal is restricted. Enter your unique<br>activation key to gain access.</div>
    </div>

    <!-- Input -->
    <div class="input-group">
      <label class="input-label" for="key-input">Activation Key</label>
      <div class="input-wrapper">
        <input
          type="text"
          id="key-input"
          class="key-input"
          placeholder="XXXX-XXXX-XXXX-XXXX"
          maxlength="24"
          autocomplete="off"
          spellcheck="false"
          autofocus
        />
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
      </div>

      <!-- Error message -->
      <div class="error-msg" id="error-msg">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-text">Invalid key. Please contact admin.</span>
      </div>
    </div>

    <!-- Login button -->
    <button class="btn-login" id="login-btn" onclick="handleLogin()">
      <div class="btn-spinner"></div>
      <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      <span class="btn-text">Unlock Access</span>
    </button>

    <div class="attempt-info" id="attempt-info">
      Attempts remaining: <span id="attempts-left">5</span>
    </div>

    <div class="divider"></div>

    <!-- Security badges -->
    <div class="badges">
      <div class="badge"><div class="badge-dot"></div> Encrypted</div>
      <div class="badge"><div class="badge-dot"></div> Secure Portal</div>
      <div class="badge"><div class="badge-dot"></div> 24/7 Live Data</div>
    </div>

  </div>
</div>

<script>
  // ── Activation Keys ──────────────────────────────────────────────────
  const ACTIVATION_KEYS = [
    'TV-A7K2-X9NP-QR45',
    'TV-B3M8-LZ7W-FG12',
    'TV-C5R1-YH6T-DJ89',
    'TV-D9P4-KU3V-SM67',
    'TV-E2N7-WB8Q-TL34',
    'TV-F6J3-XC1M-HK90',
    'TV-G8L5-ZN4R-PW23',
    'TV-H1K9-VF7B-EU56',
    'TV-I4Q2-YM6D-AC78',
    'TV-J7W8-TH9G-NB01',
    'TV-K3X6-RL2S-FD45',
    'TV-L5B1-QP4N-ZJ67',
    'TV-M9V3-UK7W-XE89',
    'TV-N2J5-HG8C-OD12',
    'TV-O6S4-FB3L-MK56',
    'OJ',
  ];

  let attemptsLeft = 5;
  let locked = false;

  // ── Auto-format key input ────────────────────────────────────────────
  const keyInput = document.getElementById('key-input');
  keyInput.addEventListener('input', function () {
    // Remove non-alphanumeric/hyphen chars, uppercase
    let val = this.value.toUpperCase().replace(/[^A-Z0-9\-]/g, '');
    this.value = val;
    // Hide error on typing
    hideError();
  });

  keyInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') handleLogin();
  });

  // ── Login handler ────────────────────────────────────────────────────
  function handleLogin() {
    if (locked) return;

    const inputKey = keyInput.value.trim().toUpperCase();

    if (!inputKey) {
      showError('Please enter your activation key.');
      shakeInput();
      return;
    }

    const btn = document.getElementById('login-btn');
    btn.classList.add('loading');
    btn.disabled = true;

    // Simulate a brief verification delay
    setTimeout(() => {
      btn.classList.remove('loading');
      btn.disabled = false;

      if (ACTIVATION_KEYS.includes(inputKey)) {
        // ✅ Valid key
        showSuccess();
      } else {
        // ❌ Invalid key
        attemptsLeft--;
        document.getElementById('attempts-left').textContent = attemptsLeft;
        shakeInput();

        if (attemptsLeft <= 0) {
          locked = true;
          showError('Too many failed attempts. Please contact admin.');
          keyInput.disabled = true;
          btn.disabled = true;
          document.getElementById('attempt-info').innerHTML = '⛔ Access locked. <span style="color:#ff4d6d">Contact admin.</span>';
        } else {
          showError(`Invalid key. Please contact admin. (${attemptsLeft} attempt${attemptsLeft !== 1 ? 's' : ''} left)`);
        }
        // Clear input after failed attempt
        keyInput.value = '';
        keyInput.focus();
      }
    }, 900);
  }

  function showError(msg) {
    const err = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    err.style.display = 'flex';
    requestAnimationFrame(() => err.classList.add('show'));
  }

  function hideError() {
    const err = document.getElementById('error-msg');
    err.classList.remove('show');
    setTimeout(() => { if (!err.classList.contains('show')) err.style.display = 'none'; }, 300);
  }

  function shakeInput() {
    const wrap = document.querySelector('.input-wrapper');
    wrap.classList.remove('shake');
    void wrap.offsetWidth; // reflow
    wrap.classList.add('shake');
    setTimeout(() => wrap.classList.remove('shake'), 500);
  }

  function showSuccess() {
    // Grant access — write session token so app.js guard passes
    sessionStorage.setItem('tv_auth', 'granted');
    const overlay = document.getElementById('success-overlay');
    overlay.classList.add('show');
    // Animate progress bar
    setTimeout(() => {
      document.getElementById('success-bar').style.width = '100%';
    }, 100);
    // Redirect after bar finishes
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 2200);
  }

  // ── Particle system ──────────────────────────────────────────────────
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function createParticle() {
    return {
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.3,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      alpha: Math.random() * 0.4 + 0.1,
      color: Math.random() > 0.5 ? '123,94,167' : '79,172,254',
    };
  }

  for (let i = 0; i < 80; i++) particles.push(createParticle());

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
      ctx.fill();
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0 || p.x > canvas.width)  p.dx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });
    requestAnimationFrame(drawParticles);
  }
  drawParticles();
</script>
</body>
</html>
